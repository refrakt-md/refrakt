name: visual-regression

# Screenshot the gallery (rune cells + layout fixtures) and diff against the
# committed per-theme baselines. Runs in Playwright's pinned container so
# anti-aliasing / font hinting are deterministic — baselines are platform-free
# and captured here (or locally via `npm run update -w @refrakt-md/gallery-harness`).

on:
  pull_request:
    paths:
      - 'packages/lumina/**'
      - 'packages/runes/**'
      - 'packages/transform/**'
      - 'packages/cli/**'
      - 'packages/gallery-harness/**'

jobs:
  visual:
    runs-on: ubuntu-latest
    # Pin the image to the @playwright/test version in the harness package.
    container: mcr.microsoft.com/playwright:v1.60.0-jammy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: npm test --workspace @refrakt-md/gallery-harness
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff
          path: packages/gallery-harness/test-results/
          retention-days: 7
